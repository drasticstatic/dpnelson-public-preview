<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Douglas P Nelson | IFS Coach California</title>
  <script>
    // spa-github-pages redirect — keeps clean URLs on GitHub Pages
    // See: https://github.com/rafgraph/spa-github-pages
    var pathSegmentsToKeep = 1; // 1 = project page (github.io/repo-name/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
